site_url: https://adechlien.blog

backend:
  name: git-gateway
  branch: main
  commit_messages:
      create: 'created "{{slug}}"'
      update: 'updated "{{slug}}"'
      delete: 'deleted "{{slug}}"'

local_backend: false

media_folder: "public/portrait"
public_folder: "/portrait"

collections:
  - name: "texts"
    label: "Texts"
    folder: "src/content/texts"
    create: true

    identifier_field: title
    slug: "{{id}}"

    fields:
      - { name: id, label: ID, widget: hidden, required: false }

      - { name: title, label: Title, widget: string }
      - name: type
        label: Type
        widget: select
        default: pintas
        options: [consciencia, lagrimas, colores, still, placebo, pintas]

      - { name: heroImage, label: Hero, widget: image, required: false }

      - name: pubDate
        label: Date
        widget: datetime
        date_format: "MMM D YYYY"
        time_format: false
        picker_utc: true

      - name: color
        label: Background
        widget: select
        default: dark
        options:
          - { label: Rich Mahogany, value: mahogany }
          - { label: Dark Coffee,   value: coffee }
          - { label: Dark Khaki,    value: khaki }
          - { label: Evergreen,     value: evergreen }
          - { label: Jet Black,     value: jet }
          - { label: Space Indigo,  value: indigo }
          - { label: Black,         value: dark }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: body, label: Body, widget: markdown }
